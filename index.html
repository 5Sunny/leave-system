<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบวันลา กองสาธารณสุข เทศบาลนครตรัง</title>
<style>
:root{
  --sage:#e8f0ea;--sage-mid:#b8d4bc;--sage-deep:#4a7c59;
  --blush:#fdf0f0;--blush-mid:#f0c8c8;--blush-deep:#c05858;
  --cream:#fdf8f2;--warm:#f7f0e8;--warm-mid:#e0d4c4;
  --lav:#f2f0fa;--lav-mid:#c8c0e8;--lav-deep:#6c60b0;
  --amb:#fef7e8;--amb-mid:#f0d89c;--amb-deep:#a07820;
  --grn:#eef7ee;--grn-mid:#b0d8b0;--grn-deep:#3a7c3a;
  --txt:#3a3530;--txt-mid:#6e665c;--txt-light:#a09888;
  --bd:#e8e0d4;--bd-soft:#f0ebe4;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Sarabun,Tahoma,sans-serif}
body{background:var(--cream);color:var(--txt)}
/* LOGIN / REGISTER SCREENS */
#login-screen,#reg-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--cream),var(--sage) 140%)}
.login-box{background:#fff;border-radius:20px;border:1px solid var(--bd-soft);padding:36px 32px;width:380px;max-width:92vw;box-shadow:0 8px 32px rgba(74,124,89,.12)}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:22px}
.login-logo h1{font-size:14.5px;font-weight:600;color:var(--txt);text-align:center;line-height:1.6}
.login-logo p{font-size:11.5px;color:var(--txt-light)}
.login-box label{font-size:12px;color:var(--txt-mid);display:block;margin-bottom:4px;margin-top:12px}
.login-box input,.login-box select{width:100%;font-size:13.5px;border:1px solid var(--bd);border-radius:10px;padding:9px 12px;background:var(--warm);color:var(--txt)}
.login-box input:focus,.login-box select:focus{outline:none;border-color:var(--sage-mid);background:#fff}
.login-btn{width:100%;margin-top:18px;padding:11px;border-radius:10px;border:none;background:var(--sage-deep);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.login-btn:hover{background:#3d6849}
.login-btn:disabled{opacity:.6;cursor:default}
.login-btn.outline{background:#fff;color:var(--sage-deep);border:1.5px solid var(--sage-deep)}
.login-btn.outline:hover{background:var(--sage)}
.err-box{margin-top:10px;font-size:12px;color:var(--blush-deep);background:var(--blush);border:1px solid var(--blush-mid);border-radius:10px;padding:8px 12px;display:none}
.ok-box{margin-top:10px;font-size:12px;color:var(--grn-deep);background:var(--grn);border:1px solid var(--grn-mid);border-radius:10px;padding:8px 12px;display:none}
.login-hint{margin-top:14px;font-size:11px;color:var(--txt-light);text-align:center;line-height:1.6}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--warm);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:13.5px;font-weight:600;color:var(--sage-deep);display:flex;align-items:center;gap:8px}
.who{display:flex;align-items:center;gap:10px}
.who-name{font-size:12px;color:var(--txt-mid)}
.who-role{font-size:10.5px;background:var(--sage);color:var(--sage-deep);padding:2px 9px;border-radius:20px;font-weight:500}
.logout-btn{font-size:12px;padding:5px 12px;border-radius:10px;border:1px solid var(--bd);background:#fff;color:var(--txt-mid);cursor:pointer}
.main{display:flex;flex:1;min-height:0}
.sidebar{width:196px;background:var(--warm);border-right:1px solid var(--bd);padding:10px 0;flex-shrink:0}
.nav{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--txt-mid);border-left:3px solid transparent;margin:1px 0;transition:.12s}
.nav:hover,.nav.on{background:var(--sage);color:var(--sage-deep)}
.nav.on{border-left-color:var(--sage-deep);font-weight:500}
.content{flex:1;padding:22px;overflow:auto;min-width:0}
.stitle{font-size:15px;font-weight:600;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--bd-soft);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-t{font-size:13px;font-weight:500;color:var(--txt-mid);margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:9px;margin-bottom:14px}
.stat{background:var(--warm);border-radius:var(--r);padding:13px;text-align:center;border:1px solid var(--bd-soft)}
.stat-n{font-size:20px;font-weight:600;color:var(--sage-deep)}
.stat-l{font-size:11px;color:var(--txt-light);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:8px 9px;font-weight:500;font-size:11px;color:var(--txt-light);border-bottom:1px solid var(--bd-soft);background:var(--warm);text-align:left}
td{padding:8px 9px;border-bottom:1px solid var(--bd-soft);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.badge.pending{background:var(--amb);color:var(--amb-deep);border:1px solid var(--amb-mid)}
.badge.approved{background:var(--grn);color:var(--grn-deep);border:1px solid var(--grn-mid)}
.badge.rejected{background:var(--blush);color:var(--blush-deep);border:1px solid var(--blush-mid)}
.badge.waiting{background:var(--lav);color:var(--lav-deep);border:1px solid var(--lav-mid)}
.btn{font-size:12px;padding:6px 13px;border-radius:10px;border:1px solid var(--bd);background:#fff;color:var(--txt-mid);cursor:pointer;transition:.12s}
.btn:hover{background:var(--warm)}
.btn:disabled{opacity:.5;cursor:default}
.btn.primary{background:var(--sage);color:var(--sage-deep);border-color:var(--sage-mid)}
.btn.soft-red{background:var(--blush);color:var(--blush-deep);border-color:var(--blush-mid)}
label{font-size:12px;color:var(--txt-mid);display:block;margin-bottom:4px}
input,select,textarea{width:100%;font-size:12.5px;border:1px solid var(--bd);border-radius:10px;padding:7px 11px;background:var(--warm);color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--sage-mid);background:#fff}
textarea{height:58px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:9px}
.form-row.full{grid-template-columns:1fr}
.form-row.tri{grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.actions{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.tip{background:var(--sage);border:1px solid var(--sage-mid);border-radius:var(--r);padding:9px 13px;font-size:12.5px;color:var(--sage-deep);margin-bottom:12px}
.qbar{background:var(--warm);border-radius:6px;height:7px;overflow:hidden;margin-top:5px;border:1px solid var(--bd-soft)}
.qfill{height:100%;border-radius:6px;background:var(--sage-deep)}
.qfill.warn{background:var(--amb-deep)}
.qfill.over{background:var(--blush-deep)}
.hd-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--bd);width:fit-content;margin-bottom:10px}
.hd-opt{padding:7px 17px;font-size:12.5px;cursor:pointer;color:var(--txt-mid);background:#fff;border:none}
.hd-opt.on{background:var(--sage);color:var(--sage-deep);font-weight:500}
.hd-opt:first-child{border-right:1px solid var(--bd)}
.period-sel{display:flex;gap:8px;margin-top:5px}
.period-btn{padding:5px 14px;font-size:12px;border-radius:20px;border:1px solid var(--bd);background:#fff;color:var(--txt-mid);cursor:pointer}
.period-btn.on{background:var(--amb);color:var(--amb-deep);border-color:var(--amb-mid);font-weight:500}
.days-chip{display:inline-block;background:var(--sage);color:var(--sage-deep);border:1px solid var(--sage-mid);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;margin-top:7px}
.empty{text-align:center;color:var(--txt-light);padding:28px;font-size:13px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Report tabs */
.rtab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.rtab{padding:7px 16px;font-size:12.5px;border-radius:20px;border:1px solid var(--bd);background:#fff;color:var(--txt-mid);cursor:pointer;transition:.12s}
.rtab.on{background:var(--sage);color:var(--sage-deep);border-color:var(--sage-mid);font-weight:500}
/* Filter bar */
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fbar select,.fbar input{width:auto;flex:1;min-width:120px}
/* Responsive */
@media(max-width:760px){
  .topbar{padding:10px 13px}
  .logo{font-size:12.5px}
  .who-name{display:none}
  .main{flex-direction:column}
  .sidebar{width:100%;display:flex;overflow-x:auto;padding:5px 7px;gap:3px;border-right:none;border-bottom:1px solid var(--bd);-webkit-overflow-scrolling:touch}
  .nav{flex:0 0 auto;white-space:nowrap;border-left:none;border-bottom:3px solid transparent;border-radius:9px 9px 0 0;padding:7px 13px}
  .nav.on{border-left-color:transparent;border-bottom-color:var(--sage-deep)}
  .content{padding:12px}
  .form-row,.form-row.tri{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  table{display:block;overflow-x:auto;white-space:nowrap}
  .period-sel{flex-direction:column}
  .actions .btn{flex:1}
  .login-box{padding:26px 20px}
}
</style>
</head>
<body>

        <circle cx="40" cy="40" r="38" fill="#1a4f8a" stroke="#c8a820" stroke-width="3"/>

        <line x1="31" y1="44" x2="22" y2="50" stroke="#f5dfa0" stroke-width="3" stroke-linecap="round"/>

      <h1>ระบบวันลา<br>กองสาธารณสุข เทศบาลนครตรัง</h1>
      <p>เข้าสู่ระบบเพื่อจัดการคำขอลา</p>

      <div><label>ชื่อ</label><input id="r-fname" placeholder="ชื่อ"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby_kCCD0ZV3dsKM7knXIGpBcUfx7YONi_vn3v_TmtDn3eprUOJZG8xLo8acvce5gX1wdg/exec";

let currentUser = null, leaveTypes = [], allRequests = [], allUsers = [];
let leaveMode = 'full', leavePeriod = 'morning', reportTab = 'person';

/* ---- API ---- */
async function apiGet(action, params={}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const res = await fetch(url); return res.json();
}
async function apiPost(action, payload) {
  const res = await fetch(API_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action,payload})});
  return res.json();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---- Screen switching ---- */
function showLogin() {
  document.getElementById('reg-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function showReg() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('reg-screen').style.display='flex';
}

/* ---- Register ---- */
async function doRegister() {
  const fname=document.getElementById('r-fname').value.trim();
  const lname=document.getElementById('r-lname').value.trim();
  const dept=document.getElementById('r-dept').value;
  const uname=document.getElementById('r-user').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  const errBox=document.getElementById('reg-error');
  const okBox=document.getElementById('reg-ok');
  errBox.style.display='none'; okBox.style.display='none';
  if(!fname||!lname||!dept||!uname||!pass) { errBox.textContent='กรุณากรอกข้อมูลให้ครบทุกช่อง'; errBox.style.display='block'; return; }
  if(pass.length<6) { errBox.textContent='รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'; errBox.style.display='block'; return; }
  if(pass!==pass2) { errBox.textContent='รหัสผ่านทั้งสองช่องไม่ตรงกัน'; errBox.style.display='block'; return; }
  const btn=document.getElementById('reg-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>กำลังส่งคำขอ...';
  try {
    const res = await apiPost('registerUser', {
      username: uname, password: pass,
      fullName: fname+' '+lname, dept, role:'pending', email:''
    });
    if(res.success) {
      okBox.textContent='ส่งคำขอลงทะเบียนเรียบร้อยแล้ว กรุณารอแอดมินอนุมัติบัญชีของคุณ';
      okBox.style.display='block';
      document.getElementById('r-fname').value='';
      document.getElementById('r-lname').value='';
      document.getElementById('r-user').value='';
      document.getElementById('r-pass').value='';
      document.getElementById('r-pass2').value='';
    } else {
      errBox.textContent = res.error||'เกิดข้อผิดพลาด'; errBox.style.display='block';

/* ---- Login ---- */
async function doLogin() {
  const username=document.getElementById('login-user').value.trim();
  const password=document.getElementById('login-pass').value;
  const errBox=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  errBox.style.display='none';
  if(!username||!password) { errBox.textContent='กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; errBox.style.display='block'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>กำลังเข้าสู่ระบบ...';
  try {
    const result = await apiGet('login',{username,password});
    if(result.success) {
      if(result.user.Role==='pending') {
        errBox.textContent='บัญชีของคุณยังรอการอนุมัติจากแอดมิน'; errBox.style.display='block';
      } else {
        currentUser=result.user;
        sessionStorage.setItem('leaveUser',JSON.stringify(currentUser));
        enterApp();
      }
    } else {
      errBox.textContent=result.error||'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง'; errBox.style.display='block';
    }
  } catch(e) { errBox.textContent='เชื่อมต่อไม่ได้: '+e.message; errBox.style.display='block'; }
  btn.disabled=false; btn.textContent='เข้าสู่ระบบ';
}

function logout() {
  sessionStorage.removeItem('leaveUser'); currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

async function enterApp() {

  document.getElementById('app').style.display='flex';

function roleLabel(r){return{employee:'พนักงาน',supervisor:'หัวหน้างาน',admin:'แอดมิน',pending:'รออนุมัติ'}[r]||r;}

/* ---- Data ---- */
async function loadLeaveTypes(){try{const r=await apiGet('getLeaveTypes');leaveTypes=r.success?r.data:[];}catch(e){leaveTypes=[];}}
async function loadRequests(){try{const r=await apiGet('getRequests');allRequests=r.success?r.data:[];}catch(e){allRequests=[];}}
async function loadUsers(){try{const r=await apiGet('getUsers');allUsers=r.success?r.data:[];}catch(e){allUsers=[];}}

function sTh(s){return{pending:'รออนุมัติ',approved:'อนุมัติแล้ว',rejected:'ไม่อนุมัติ'}[s]||s;}
function dFmt(d){return Number(d)===0.5?'½ วัน':d+' วัน';}
function fmtDate(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return v;return d.toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'});}
function isoDate(v){if(!v)return'';const d=new Date(v);if(isNaN(d))return'';return d.toISOString().slice(0,10);}

function setMode(m){leaveMode=m;document.querySelectorAll('.hd-opt').forEach(el=>el.classList.remove('on'));document.getElementById('mode-'+m)?.classList.add('on');updateLeaveMode();}
function setPeriod(p){leavePeriod=p;document.querySelectorAll('.period-btn').forEach(el=>el.classList.remove('on'));document.getElementById('period-'+p)?.classList.add('on');}
function updateLeaveMode(){
  const hs=document.getElementById('half-section'),fs=document.getElementById('full-section'),hd=document.getElementById('half-date-row');
  if(!hs) return;
  if(leaveMode==='half'){hs.style.display='block';fs.style.display='none';hd.hidden=false;document.getElementById('days-chip').textContent='จำนวน: 0.5 วัน';}

function calcDays(){
  const s=document.getElementById('f-start')?.value,e=document.getElementById('f-end')?.value,chip=document.getElementById('days-chip');
  if(!chip||leaveMode==='half') return;
  if(s&&e){const d1=new Date(s),d2=new Date(e);if(d2>=d1){let c=0;for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){if(d.getDay()!==0&&d.getDay()!==6)c++;}chip.textContent='จำนวน: '+c+' วัน (วันทำการ)';}else chip.textContent='กรุณาเลือกวันให้ถูกต้อง';}}
async function submitLeave(){
  const type=document.getElementById('f-type').value,reason=document.getElementById('f-reason').value.trim(),doc=document.getElementById('f-doc').value.trim();
  let start,end,days,period;
  if(leaveMode==='half'){start=end=document.getElementById('f-start-half').value;days=0.5;period=leavePeriod==='morning'?'ช่วงเช้า':'ช่วงบ่าย';}
  else{start=document.getElementById('f-start').value;end=document.getElementById('f-end').value;period='เต็มวัน';if(start&&end){const d1=new Date(start),d2=new Date(end);let c=0;for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){if(d.getDay()!==0&&d.getDay()!==6)c++;}days=c;}}
  if(!start||!end||!days||!reason){showToast('กรุณากรอกข้อมูลให้ครบถ้วน');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.innerHTML='<span class="spinner" style="border-color:rgba(74,124,89,.3);border-top-color:var(--sage-deep)"></span>กำลังบันทึก...';
  try{const res=await apiPost('createRequest',{empName:currentUser.FullName,dept:currentUser.Dept,username:currentUser.Username,leaveType:type,startDate:start,endDate:end,days,period,reason,document:doc});

    else showToast('เกิดข้อผิดพลาด: '+(res.error||''));
  }catch(e){showToast('เชื่อมต่อไม่ได้: '+e.message);}
  btn.disabled=false;btn.textContent='ยื่นคำขอ';
}

    const emp=ur[0];
    const filterEmp=document.getElementById('rp-emp')?.value||'';
    const filterType=document.getElementById('rp-type')?.value||'';
    if(filterEmp&&emp.EmpName!==filterEmp) return '';
    const byType=leaveTypes.map(t=>{const d=ur.filter(r=>r.LeaveType===t.TypeName&&(!filterType||r.LeaveType===filterType)).reduce((a,r)=>a+Number(r.Days),0);return`<td>${d>0?d:'—'}</td>`;}).join('');
    const total=ur.filter(r=>!filterType||r.LeaveType===filterType).reduce((a,r)=>a+Number(r.Days),0);
    return`<tr><td>${emp.EmpName}</td><td>${emp.Dept}</td>${byType}<td><strong>${total}</strong></td></tr>`;
  }).filter(Boolean).join('')||'<tr><td colspan="20" class="empty">ไม่มีข้อมูล</td></tr>'}
  </tbody></table></div>`;
}

function reportDay(){
  const apvReqs=allRequests.filter(r=>r.Status==='approved');
  const today=new Date().toISOString().slice(0,10);
  const defStart=today.slice(0,7)+'-01';
  return `<div class="fbar">
    <div><label style="margin:0;font-size:11px">ตั้งแต่วันที่</label><input type="date" id="rd-from" value="${defStart}" onchange="switchRtab('day')"></div>
    <div><label style="margin:0;font-size:11px">ถึงวันที่</label><input type="date" id="rd-to" value="${today}" onchange="switchRtab('day')"></div>
  </div>
  <div class="card"><table><thead><tr><th>วันที่</th><th>พนักงาน</th><th>กอง</th><th>ประเภท</th><th>จำนวน</th></tr></thead>
  <tbody id="rd-tbody">${buildDayRows(apvReqs, defStart, today)}</tbody></table></div>`;
}
function buildDayRows(reqs, from, to){
  const f=new Date(from),t=to?new Date(to):new Date();
  const rows=reqs.filter(r=>{const d=new Date(isoDate(r.StartDate));return d>=f&&d<=t;})
    .sort((a,b)=>new Date(isoDate(a.StartDate))-new Date(isoDate(b.StartDate)));
  if(!rows.length) return '<tr><td colspan="5" class="empty">ไม่มีข้อมูลในช่วงนี้</td></tr>';
  return rows.map(r=>`<tr><td>${fmtDate(r.StartDate)}</td><td>${r.EmpName}</td><td>${r.Dept}</td><td>${r.LeaveType}</td><td>${dFmt(r.Days)}</td></tr>`).join('');
}

function reportYear(){
  const years=[...new Set(allRequests.filter(r=>r.Status==='approved').map(r=>{const d=new Date(isoDate(r.StartDate));return isNaN(d)?null:d.getFullYear()+543;}))].filter(Boolean).sort((a,b)=>b-a);
  const curYear=new Date().getFullYear()+543;
  const selYear=years.includes(curYear)?curYear:(years[0]||curYear);
  const apvReqs=allRequests.filter(r=>{if(r.Status!=='approved') return false;const d=new Date(isoDate(r.StartDate));return !isNaN(d)&&(d.getFullYear()+543)===selYear;});
  const tot=apvReqs.length, days=apvReqs.reduce((a,r)=>a+Number(r.Days),0);
  return `<div class="fbar">
    <select id="ry-year" onchange="switchRtab('year')">
      ${(years.length?years:[curYear]).map(y=>`<option value="${y}"${y===selYear?' selected':''}>${y}</option>`).join('')}
    </select>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n">${tot}</div><div class="stat-l">คำขอที่อนุมัติ</div></div>
    <div class="stat"><div class="stat-n">${days}</div><div class="stat-l">รวมวันลา</div></div>
    <div class="stat"><div class="stat-n">${[...new Set(apvReqs.map(r=>r.Username))].length}</div><div class="stat-l">พนักงานที่ลา</div></div>
  </div>
  <div class="card"><div class="card-t">สรุปตามประเภทการลา ปี ${selYear}</div>
  <table><thead><tr><th>ประเภทการลา</th><th>จำนวนครั้ง</th><th>รวมวัน</th></tr></thead>
  <tbody>${leaveTypes.map(t=>{const rs=apvReqs.filter(r=>r.LeaveType===t.TypeName),d=rs.reduce((a,r)=>a+Number(r.Days),0);return`<tr><td>${t.TypeName}</td><td>${rs.length}</td><td>${d} วัน</td></tr>`;}).join('')}</tbody></table></div>
  <div class="card"><div class="card-t">สรุปรายบุคคล ปี ${selYear}</div>
  <table><thead><tr><th>ชื่อ-สกุล</th><th>กอง</th><th>จำนวนครั้ง</th><th>รวมวัน</th></tr></thead>
  <tbody>${[...new Set(apvReqs.map(r=>r.Username))].map(u=>{const ur=apvReqs.filter(r=>r.Username===u),e=ur[0],d=ur.reduce((a,r)=>a+Number(r.Days),0);return`<tr><td>${e.EmpName}</td><td>${e.Dept}</td><td>${ur.length}</td><td>${d} วัน</td></tr>`;}).join('')||'<tr><td colspan="4" class="empty">ไม่มีข้อมูล</td></tr>'}</tbody></table></div>`;
}

/* ---- Boot ---- */
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
(function boot(){const saved=sessionStorage.getItem('leaveUser');if(saved){currentUser=JSON.parse(saved);enterApp();}})();
</script>
